    <form action="/form" method="post" enctype="application/x-www-form-urlencode" target="_self">
        <div>
            <h2>Please enter your information to reserve a room:</h2>
            <br>
            <label for="name">Your name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="uhid">UH ID number:</label>
            <input type="number" id="uhid" name="uhid" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone">
            <br><br>

            <label for="contact-preference">Contact preference:</label>
            <input type="checkbox" id="email_pref" name="contact-preference" value="email">
            <label for="email_pref">Email</label>
            <input type="checkbox" id="phone_pref" name="contact-preference" value="phone">
            <label for="phone_pref">Phone</label>
            <br><br>
            
            
        </div>

        <div>
            <h2>Please select the room to check availability</h2>

            <label for="room">Room:</label>
            <select id="room" name="room" required>
                <option value="">--Select a room--</option>
                <option value="101">Room 101</option>
                <option value="102">Room 102</option>
                <option value="103">Room 103</option>
                <option value="104">Room 104</option>
                <option value="105">Room 105</option>
                <option value="106">Room 106</option>
                <option value="107">Room 107</option>
                <option value="108">Room 108</option>
                <option value="201">Room 201</option>
                <option value="202">Room 202</option>
                <option value="203">Room 203</option>
                <option value="204">Room 204</option>
                <option value="205">Room 205</option>
                <option value="206">Room 206</option>
                <option value="207">Room 207</option>
                <option value="208">Room 208</option>
            </select>
            <br><br>

            <label for="datetime-start">Reservation start:</label>
            <input type="datetime-local" id="datetime-start" name="datetime-start">
            <br><br>
            <label for="datetime-end">Reservation end:</label>
            <input type="datetime-local" id="datetime-end" name="datetime-end">
            <br><br>

            
            
        </div>

        

        


        <button type="submit">Submit</button>
    </form>
