    <form>
        <div>
            <h2>Contact Info:</h2>
            <label for="contactable">Would you like to receive a response to your feedback?</label>
            <br>
            <select id="contactable" name="location" required>
                <option value="">--Select a response--</option>
                <option value="y">Yes</option>
                <option value="n">No</option>
            </select>

            <br><br><br>


            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            <br><br>

            <label for="contact-preference">Contact preference:</label>
            <input type="checkbox" id="mail_pref" name="contact-preference" value="mail">
            <label for="mail_pref">Snail mail</label>
            <input type="checkbox" id="email_pref" name="contact-preference" value="email">
            <label for="email_pref">Email</label>
            <input type="checkbox" id="phone_pref" name="contact-preference" value="phone">
            <label for="phone_pref">Email</label>
            <br><br>
            
            
        </div>

        <div>
            <h2>How did we do?</h2>

            <label for="location">Location:</label>
            <select id="location" name="location" required>
                <option value="">--Select a location--</option>
                <option value="a">AAA</option>
                <option value="b">BBB</option>
                <option value="c">CCC</option>
                <option value="d">DDD</option>
            </select>
            <br><br>

            <label for="disposition">How do you feel?</label>
            <input type="radio" id="angry" name="contact-preference" value="angry">
            <label for="angry">:(</label>
            <input type="radio" id="neutral" name="contact-preference" value="neutral">
            <label for="neutral">:|</label>
            <input type="radio" id="happy" name="contact-preference" value="happy">
            <label for="happy">:)</label>
            <br><br>

            <label for="rating">Rating:</label>
            <input type="number" id="rating" name="rating" min="1" max="10">
            <br><br>

            
            
        </div>

        

        


        <button type="submit">Submit</button>
    </form>
